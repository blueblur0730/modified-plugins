# This is a basic workflow that is manually triggered
# Is it a ci?

name: Compile or Release

on:
  pull_request:
    paths: ["source/**", "include/**", "pushtrigger.txt"]
    branches: [master, main, workflow]

  push:
    paths: ["source/**", "include/**", "pushtrigger.txt"]
    branches: [master, main, workflow]

  workflow_dispatch:

jobs:
  build:
    name: Build with sm-${{ matrix.sm_version }}

    strategy:
      fail-fast: false
      matrix:
        sm_version: ["1.12", "1.13.7295"]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        name: Checkout Repo
        with:
          submodules: recursive

      - name: Retrive Date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - uses: actions/setup-python@v6
        name: Prepare Python
        with:
          python-version: 3.11

      - name: Set up NinjaBuild
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - uses: rumblefrog/setup-sp@master
        name: Install SourcePawn Compiler
        with:
          version: ${{ matrix.sm_version }}

      - name: Configure and Build
        id: build
        continue-on-error: true
        run: |
          python3 configure.py --spcomp-dir "$scriptingPath"
          ninja

      - uses: actions/upload-artifact@v7
        name: Upload the Package
        if: steps.build.outcome == 'success'
        with:
          name: modified-plugins-sm-${{ matrix.sm_version }}-${{ env.DATE }}
          path: |
            build/source/
            build/include/
            LICENSE
            README.md
            README-cn.md

  delete:
    name: delete old assets
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Env
        run: | 
            echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Delete current release assets
        uses: andreaswilli/delete-release-assets-action@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # tagPrefix:
          tag: release-${{ env.DATE }}
          deleteOnlyFromDrafts: false

  release:
    strategy:
      fail-fast: false
      matrix:
        sm_version: ["1.12", "1.13.7295"]

    name: Release with sm-${{ matrix.sm_version }}

    # only release if the workflow is manually triggered
    # if: contains(fromJson('["workflow_dispatch"]'), github.event_name)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        name: Checkout Repo
        with:
          submodules: recursive

      - name: Prepare Env
        run: | 
             echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
             echo "GITHUB_SHA_SHORT=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Download package
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: tmp/
          pattern: modified-plugins-sm-${{ matrix.sm_version }}-${{ env.DATE }}

      - name: Prepare Release
        working-directory: tmp/
        run: |
          for i in */; 
          do 
            zip -0 -r "${i%/}.zip" "$i" & 
          done; 
          wait

      - name: Release (Pull Request)
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.name }}
          PR_AUTHOR_EMAIL: ${{ github.event.pull_request.user.email }}

        uses: xresloader/upload-to-github-release@main
        with:
          file: "modified-plugins-sm-${{ matrix.sm_version }}-*.zip"
          draft: false
          prerelease: false
          branches: master
          tag_name: release-${{ env.DATE }}
          tags: true
          update_latest_release: true
          overwrite: true
          default_release_name: modified-plugins-${{ env.DATE }}
          update_release_body: | 
           ## Release Updated On Pull Request:
            - ${{ github.event.pull_request.number }} 
              - ${{ env.PR_TITLE }} (by ${{ env.PR_AUTHOR }} @${{ env.PR_AUTHOR_EMAIL }})
              - with number of commits: ${{ github.event.pull_request.commits }}

          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release (Push)
        if: github.event_name == 'push'
        uses: xresloader/upload-to-github-release@main
        with:
          file: "modified-plugins-sm-${{ matrix.sm_version }}-*.zip"
          draft: false
          prerelease: false
          branches: master
          tag_name: release-${{ env.DATE }}
          tags: true
          update_latest_release: true
          overwrite: true
          default_release_name: modified-plugins-${{ env.DATE }}
          update_release_body: |
           ## Release Updated On Commit: 
            - (${{ env.GITHUB_SHA_SHORT }}) 
              - ${{ github.event.commits[0].message }} (by ${{ github.event.commits[0].author.name }} in ${{ github.event.commits[0].timestamp }})
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release (Dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: xresloader/upload-to-github-release@main
        with:
          file: "modified-plugins-sm-${{ matrix.sm_version }}-*.zip"
          draft: false
          prerelease: false
          branches: master
          tag_name: release-${{ env.DATE }}
          tags: true
          update_latest_release: true
          overwrite: true
          default_release_name: modified-plugins-${{ env.DATE }}
          update_release_body: |
           ## Release Updated On Manually Triggered Workflow
            - (${{ env.GITHUB_SHA_SHORT }}) (by ${{ github.triggering_actor }})
          token: ${{ secrets.GITHUB_TOKEN }}

